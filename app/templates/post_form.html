<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit' if post else 'New' }} Post — Impera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#C9A84C',
                        'accent-light': '#E5C878',
                        gold: '#71717A',
                        panel: '#111111',
                    },
                    fontFamily: {
                        'display': ['Bangers', 'sans-serif'],
                        'accent': ['Permanent Marker', 'cursive'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .comic-border { border: 3px solid #000; box-shadow: 4px 4px 0px #000; }
        .dropzone {
            border: 3px dashed #333;
            transition: border-color 0.2s, background 0.2s;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #C9A84C;
            background: rgba(201, 168, 76, 0.1);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#F5F0E6]">
    <!-- Nav -->
    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a]/90 border-b-2 border-black">
        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-display tracking-widest text-accent">IMPERA</span>
                <span class="text-sm text-gray-500">/ Admin</span>
            </div>
            <a href="/admin" class="text-sm text-gray-400 hover:text-accent">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="pt-24 px-6 pb-12">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-4xl font-display mb-8">{{ 'Edit Post' if post else 'New Post' }}</h1>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                <!-- Title -->
                <div>
                    <label class="block text-sm font-bold mb-2">Title</label>
                    <input
                        type="text"
                        name="title"
                        required
                        value="{{ post.title if post else '' }}"
                        class="w-full bg-panel border-2 border-black px-4 py-3 focus:outline-none focus:border-accent comic-border"
                        placeholder="Enter post title"
                    >
                </div>

                <!-- Body -->
                <div>
                    <label class="block text-sm font-bold mb-2">Body</label>
                    <textarea
                        name="body"
                        required
                        rows="8"
                        class="w-full bg-panel border-2 border-black px-4 py-3 focus:outline-none focus:border-accent comic-border resize-none"
                        placeholder="Write your post content..."
                    >{{ post.body if post else '' }}</textarea>
                </div>

                <!-- Images -->
                <div>
                    <label class="block text-sm font-bold mb-2">Images</label>
                    <div
                        id="dropzone"
                        class="dropzone rounded-lg p-8 text-center cursor-pointer"
                        onclick="document.getElementById('fileInput').click()"
                    >
                        <p class="text-gray-400">Click to upload or drag images here</p>
                        <p class="text-xs text-gray-600 mt-2">JPG, PNG, WebP — max 5MB each</p>
                        <input
                            type="file"
                            id="fileInput"
                            accept="image/jpeg,image/png,image/webp"
                            multiple
                            class="hidden"
                            onchange="handleFiles(this.files)"
                        >
                    </div>

                    <!-- Image Preview Grid -->
                    <div id="imagePreview" class="grid grid-cols-4 gap-4 mt-4">
                        {% if images %}
                        {% for img in images %}
                        <div class="relative group" id="img-{{ img.id }}">
                            <img src="/static/img/comics/{{ img.filename }}" class="w-full aspect-square object-cover border-2 border-black">
                            <button
                                type="button"
                                onclick="removeImage({{ img.id }}, '{{ img.filename }}')"
                                class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity"
                            >×</button>
                        </div>
                        {% endfor %}
                        {% endif %}
                    </div>
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-sm font-bold mb-2">Status</label>
                    <select name="status" class="w-full bg-panel border-2 border-black px-4 py-3 focus:outline-none focus:border-accent comic-border">
                        <option value="draft" {% if post and post.status == 'draft' %}selected{% endif %}>Draft</option>
                        <option value="published" {% if post and post.status == 'published' %}selected{% endif %}>Published</option>
                    </select>
                </div>

                <!-- Actions -->
                <div class="flex gap-4 pt-4">
                    <button
                        type="submit"
                        class="flex-1 bg-accent text-black font-bold py-4 hover:bg-accent-light transition-colors comic-border"
                    >
                        {{ 'Update Post' if post else 'Create Post' }}
                    </button>
                    <a
                        href="/admin"
                        class="px-6 py-4 border-2 border-gray-600 text-gray-400 hover:border-gray-400 hover:text-white transition-colors"
                    >
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const postId = {{ post.id if post else 'null' }};

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.size > 5 * 1024 * 1024) {
                    alert('File too large: ' + file.name);
                    return;
                }

                if (postId) {
                    const formData = new FormData();
                    formData.append('image', file);

                    fetch(`/admin/posts/${postId}/images`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        const preview = document.getElementById('imagePreview');
                        const div = document.createElement('div');
                        div.className = 'relative group';
                        div.id = `img-${data.id}`;
                        div.innerHTML = `
                            <img src="/static/img/comics/${data.filename}" class="w-full aspect-square object-cover border-2 border-black">
                            <button type="button" onclick="removeImage(${data.id}, '${data.filename}')" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                        `;
                        preview.appendChild(div);
                    });
                } else {
                    // Show local preview for new posts
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.getElementById('imagePreview');
                        const div = document.createElement('div');
                        div.className = 'relative group';
                        div.innerHTML = `
                            <img src="${e.target.result}" class="w-full aspect-square object-cover border-2 border-black">
                            <button type="button" onclick="this.parentElement.remove()" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                        `;
                        preview.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function removeImage(imgId, filename) {
            if (confirm('Remove this image?')) {
                document.getElementById(`img-${imgId}`).remove();
            }
        }

        // Drag and drop
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
    </script>
</body>
</html>
