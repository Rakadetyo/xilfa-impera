<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Impera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#C9A84C',
                        'accent-light': '#E5C878',
                        gold: '#71717A',
                    },
                    fontFamily: {
                        'display': ['Bangers', 'sans-serif'],
                        'accent': ['Permanent Marker', 'cursive'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .comic-border { border: 3px solid #000; box-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#F5F0E6] min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-6xl font-display text-accent">IMPERA</h1>
            <p class="text-gray-400 mt-2">Admin Registration</p>
        </div>

        <!-- Register Form -->
        <form method="POST" class="bg-panel p-8 comic-border">
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2">Username</label>
                <input
                    type="text"
                    name="username"
                    required
                    class="w-full bg-[#0a0a0a] border-2 border-black px-4 py-3 focus:outline-none focus:border-accent"
                    placeholder="Choose username"
                >
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold mb-2">Password</label>
                <input
                    type="password"
                    name="password"
                    required
                    minlength="6"
                    class="w-full bg-[#0a0a0a] border-2 border-black px-4 py-3 focus:outline-none focus:border-accent"
                    placeholder="Choose password (min 6 chars)"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-accent text-black font-bold py-4 hover:bg-accent-light transition-colors comic-border"
            >
                DAFTAR
            </button>
        </form>

        <!-- Back to home -->
        <div class="text-center mt-6">
            <a href="/" class="text-gray-500 hover:text-accent text-sm">← Back to Home</a>
        </div>
    </div>
</body>
</html>
